<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF8F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <title>Frederick Radius — Local civic data for Frederick County, MD</title>
    <meta
      name="description"
      content="A daily companion for Frederick County: live weather, water, traffic, 311, meetings, and the civic information that shapes your address."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Frederick Radius" />
    <meta property="og:title" content="Frederick Radius" />
    <meta
      property="og:description"
      content="Local weather, traffic, water, meetings, and civic data for Frederick County, Maryland."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frederick Radius" />
    <meta
      name="twitter:description"
      content="Local weather, traffic, water, meetings, and civic data for Frederick County, Maryland."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply theme class before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('fr-theme');
          var resolved = stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
